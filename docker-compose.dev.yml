# Docker Compose for Development
# 默认：只运行数据库服务，应用代码在本地运行
# prod-test 模式：运行完整生产镜像测试（先构建镜像再用 --profile prod-test 启动）
# 包含本地 API、MongoDB、Meilisearch 和 WeChat Bridge
#   docker build -f Dockerfile.multi --target api-build -t librechat-local:test .
#   docker compose -f docker-compose.dev.yml --profile prod-test up

services:
  mongodb:
    container_name: chat-mongodb
    image: mongo:8.0.17
    restart: always
    volumes:
      - ./data-node:/data/db
    command: mongod --noauth

  meilisearch:
    container_name: chat-meilisearch
    image: getmeili/meilisearch:v1.12.3
    restart: always
    ports:
      - "7700:7700"  # 暴露给本地访问
    environment:
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-your-meilisearch-master-key-here}
    volumes:
      - ./meili_data_v1.12:/meili_data

  vectordb:
    container_name: vectordb
    image: pgvector/pgvector:0.8.0-pg15-trixie
    ports:
      - "5433:5432"  # 使用 5433 避免与本地 PostgreSQL 冲突
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    restart: always
    volumes:
      - pgdata2:/var/lib/postgresql/data
    profiles:
      - rag  # 标记为可选服务

  rag_api:
    container_name: rag_api
    image: ghcr.io/danny-avila/librechat-rag-api-dev-lite:latest
    ports:
      - "8000:8000"  # 暴露给本地访问
    environment:
      - DB_HOST=vectordb
      - RAG_PORT=${RAG_PORT:-8000}
    restart: always
    depends_on:
      - vectordb
    env_file:
      - .env
    profiles:
      - rag  # 标记为可选服务

  # 生产镜像本地测试服务（--profile prod-test 启用）
  # 先构建：docker build -f Dockerfile.multi --target api-build -t librechat-local:test .
  api-prod-test:
    container_name: LibreChat-prod-test
    image: librechat-local:test
    restart: always
    ports:
      - "3080:3080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mongodb
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3080
      - MONGO_URI=mongodb://mongodb:27017/LibreChat
      - MEILI_HOST=http://meilisearch:7700
      - WECHAT_BRIDGE_URL=http://wechat-bridge-prod-test:3091
      - WECHAT_BRIDGE_INTERNAL_TOKEN=${WECHAT_BRIDGE_INTERNAL_TOKEN:-local-wechat-bridge-token}
      - DOMAIN_CLIENT=http://localhost:3080
      - DOMAIN_SERVER=http://localhost:3080
      - PROXY=${LOCAL_TEST_PROXY:-}
    volumes:
      - ./.env:/app/.env
      - ./librechat.yaml:/app/librechat.yaml
      - ./images:/app/client/public/images
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./data:/app/data
      - ./data:/app/api/data
    profiles:
      - prod-test

  wechat-bridge-prod-test:
    container_name: LibreChat-WeChat-Bridge-prod-test
    image: librechat-local:test
    restart: always
    depends_on:
      - api-prod-test
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - WECHAT_BRIDGE_PORT=3091
      - WECHAT_BRIDGE_LIBRECHAT_URL=http://api-prod-test:3080
      - WECHAT_BRIDGE_INTERNAL_TOKEN=${WECHAT_BRIDGE_INTERNAL_TOKEN:-local-wechat-bridge-token}
      - LIBRECHAT_LOG_DIR=/app/logs
      - PROXY=${LOCAL_TEST_PROXY:-}
    command:
      - node
      - -e
      - require('/app/packages/api/dist/index.js').startWeChatBridge().catch((error) => { console.error(error); process.exit(1); })
    volumes:
      - ./.env:/app/.env
      - ./logs:/app/logs
    profiles:
      - prod-test

volumes:
  pgdata2:
